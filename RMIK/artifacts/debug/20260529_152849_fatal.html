/* Works on Firefox */
* {
  scrollbar-color: #bfbfbf #f5f3f3;
  scrollbar-width: thin;
}

/* Works on Chrome, Edge, and Safari */
::-webkit-scrollbar {
  width: 6px;
}

::-webkit-scrollbar-track {
  background: #f5f3f3;
}

::-webkit-scrollbar-thumb {
  background-color: #b3b5b8;
  border: 3px solid #979393;
  border-radius: 20px;
}

::-moz-placeholder {
  /* Chrome, Firefox, Opera, Safari 10.1+ */
  color: #9ca3af;
  opacity: 1; /* Firefox */
}

::placeholder {
  /* Chrome, Firefox, Opera, Safari 10.1+ */
  color: #9ca3af;
  opacity: 1; /* Firefox */
}

:-ms-input-placeholder {
  /* Internet Explorer 10-11 */
  color: #9ca3af;
}

::-ms-input-placeholder {
  /* Microsoft Edge */
  color: #9ca3af;
}

.break-anywhere {
  word-break: break-word;
}

button {
  cursor:pointer;border-width:1px;--un-border-opacity:1;border-color:rgba(209,213,219,var(--un-border-opacity));border-radius:0.5rem;border-style:solid;--un-bg-opacity:1;background-color:rgba(255,255,255,var(--un-bg-opacity));padding:0.5rem;--un-text-opacity:1;color:rgba(75,85,99,var(--un-text-opacity));
}button:disabled{cursor:not-allowed;opacity:0.25;}button:hover{--un-bg-opacity:1;background-color:rgba(209,213,219,var(--un-bg-opacity));}

p {
  margin: 0;
}

button,input,textarea {
  font-family: Manrope,sans-serif;
}

/* shimmer */
.shimmer {
  animation: skeleton-loading 1.4s ease infinite;
  background: linear-gradient(90deg, #f2f2f2 25%, #e6e6e6 37%, #f2f2f2 63%);
  background-size: 400% 100%;
  /* height: 20px; */
  border-radius: 10px;
  display: block;
}
@keyframes shine {
  to {
    background-position: 100% 0;
  }
}
@keyframes skeleton-loading {
  0% {
    background-position: 100% 50%;
  }
  to {
    background-position: 0 50%;
  }
}

/* custom checkbox */
:root {
  --form-control-color: #00b8ac;
  --form-control-disabled: #959495;
}
.v-onboarding-item__header-title {
  color: #16b3ac;
}
.v-onboarding-item__actions button {
  border-radius: 9px !important;
  flex: 0 !important;
  width: 50%;
}
.v-onboarding-item__actions button.v-onboarding-btn-primary {
  background-color: #fff !important;
  border-color: #16b3ac !important;
  color: #16b3ac !important;
  display: flex;
  justify-content: flex-end;
}
button.v-onboarding-item__header-close {
  align-items: flex-start !important;
  border: none !important;
  height: 40px;
  width: 40px;
}
button.v-onboarding-item__header-close:hover {
  background-color: #fff !important;
}
[data-v-onboarding-wrapper] [data-popper-placement^=right]>[data-popper-arrow] {
  left: 12px !important;
}
[data-v-onboarding-wrapper] [data-popper-placement^=top] {
  padding-bottom: 20px !important;
}
[data-v-onboarding-wrapper] [data-popper-placement^=top]>[data-popper-arrow] {
  bottom: 25px !important;
}
[data-v-onboarding-wrapper] [data-popper-placement^=bottom] {
  padding-top: 20px !important;
}
[data-v-onboarding-wrapper] [data-popper-placement^=bottom]>[data-popper-arrow]:before {
  left: -123px !important;
  top: -2px !important;
}
.form-control {
  display: grid;
  gap: .5em;
  grid-template-columns: 1em auto;
  line-height: 1.1;
}
.form-control--disabled {
  color: var(--form-control-disabled);
  cursor: not-allowed;
  opacity: .5;
}
input[type=checkbox] {
  left: 0;
  opacity: 0;
  outline: none;
  position: absolute;
  z-index: -1;
}
input[type=checkbox]+.check {
  background: #fff;
  border: 1px solid #7a7a7a;
  border-radius: 4px;
  flex-shrink: 0;
  height: 1.25em;
  transition: background .15s ease-out;
  width: 1.25em;
}
input[type=checkbox]:disabled+.check {
  background: transparent;
  border: 1px solid #7a7a7a;
  border-radius: 4px;
  flex-shrink: 0;
  height: 1.25em;
  opacity: .2;
  pointer-events: none;
  transition: background .15s ease-out;
  width: 1.25em;
}
input[type=checkbox]:checked:disabled+.check {
  background: #00b8ac url(https://api.iconify.design/mdi:check-bold.svg?color=%23ffffff) no-repeat 50%;
  border-color: #00b8ac;
  opacity: .2;
  pointer-events: none;
}
input[type=checkbox]:checked+.check {
  background: #00b8ac url(https://api.iconify.design/mdi:check-bold.svg?color=%23ffffff) no-repeat 50%;
  border-color: #00b8ac;
}
input[type=checkbox]:disabled.is-indeterminate+.check {
  background: #00b8ac url(https://api.iconify.design/fluent:line-horizontal-1-16-filled.svg?color=%23ffffff) no-repeat
    50%;
  border-color: #00b8ac;
  opacity: .2;
  pointer-events: none;
}
input[type=checkbox].is-indeterminate+.check {
  background: #00b8ac url(https://api.iconify.design/fluent:line-horizontal-1-16-filled.svg?color=%23ffffff) no-repeat
    50%;
  border-color: #00b8ac;
}

/* Remove Arrows/Spinners pada input type number */
/* Chrome, Safari, Edge, Opera */
input::-webkit-inner-spin-button,input::-webkit-outer-spin-button {
  -webkit-appearance: none;
  margin: 0;
}

input::-moz-inner-spin-button,input::-moz-outer-spin-button {

  margin: 0;

/* toast */
#toast--response-fetch {
  border-radius: 5px;
  color: #fff;
  margin-left: -125px;
  position: fixed;
  right: 30px;
